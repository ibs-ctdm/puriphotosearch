name: Build & Release

on:
  push:
    tags:
      - "v*"        # Trigger on version tags like v1.0.0

  workflow_dispatch:  # Allow manual trigger

jobs:
  # ============================================================
  # macOS Build (.dmg)
  # ============================================================
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install matplotlib

      - name: Download InsightFace model
        run: python scripts/download_model.py models

      - name: Build .app with PyInstaller
        run: |
          python -m PyInstaller photosearch.spec \
            --clean --noconfirm \
            --distpath dist --workpath build

      - name: Create .dmg
        run: |
          APP_NAME="PuriPhotoSearch"
          DMG_NAME="${APP_NAME}-${{ github.ref_name }}-macOS.dmg"
          mkdir -p dist/dmg_staging
          cp -R dist/${APP_NAME}.app dist/dmg_staging/
          ln -s /Applications dist/dmg_staging/Applications
          hdiutil create \
            -volname "${APP_NAME}" \
            -srcfolder dist/dmg_staging \
            -ov -format UDBZ \
            "dist/${DMG_NAME}"
          rm -rf dist/dmg_staging

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/PuriPhotoSearch-*-macOS.dmg

  # ============================================================
  # Windows Build (.exe)
  # ============================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install matplotlib

      - name: Download InsightFace model
        run: python scripts/download_model.py models

      - name: Build .exe with PyInstaller
        run: |
          python -m PyInstaller photosearch_win.spec `
            --clean --noconfirm `
            --distpath dist --workpath build

      - name: Create zip archive
        run: |
          $version = "${{ github.ref_name }}"
          Compress-Archive -Path "dist\PuriPhotoSearch" -DestinationPath "dist\PuriPhotoSearch-${version}-Windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist/PuriPhotoSearch-*-Windows.zip

  # ============================================================
  # Create GitHub Release (only on tag push)
  # ============================================================
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PuriPhotoSearch ${{ github.ref_name }}"
          body: |
            ## PuriPhotoSearch ${{ github.ref_name }}

            ### Downloads
            - **macOS**: `PuriPhotoSearch-${{ github.ref_name }}-macOS.dmg`
            - **Windows**: `PuriPhotoSearch-${{ github.ref_name }}-Windows.zip`

            ### Installation
            **macOS**: Open .dmg → Drag to Applications
            **Windows**: Extract .zip → Run PuriPhotoSearch.exe
          files: |
            artifacts/macos-dmg/*
            artifacts/windows-zip/*
          draft: false
          prerelease: false
