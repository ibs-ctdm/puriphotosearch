name: Build & Release

on:
  push:
    tags:
      - "v*"        # Trigger on version tags like v1.0.0

  workflow_dispatch:  # Allow manual trigger

jobs:
  # ============================================================
  # macOS Build (.dmg)
  # ============================================================
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install matplotlib

      - name: Download InsightFace model
        run: python scripts/download_model.py models

      - name: Build .app with PyInstaller
        run: |
          python -m PyInstaller photosearch.spec \
            --clean --noconfirm \
            --distpath dist --workpath build

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Decode certificate
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > /tmp/certificate.p12

          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import /tmp/certificate.p12 \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Clean up
          rm /tmp/certificate.p12

      - name: Code sign .app
        run: |
          APP_NAME="PuriPhotoSearch"
          SIGN_IDENTITY="Developer ID Application: Phra Anavach Purivaro (7ZFZ2CSF6M)"

          cat > /tmp/entitlements.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
              <true/>
              <key>com.apple.security.cs.allow-jit</key>
              <true/>
              <key>com.apple.security.cs.disable-library-validation</key>
              <true/>
          </dict>
          </plist>
          EOF

          codesign --force --deep --options runtime \
            --sign "$SIGN_IDENTITY" \
            --entitlements /tmp/entitlements.plist \
            "dist/${APP_NAME}.app"

          codesign --verify --deep --strict "dist/${APP_NAME}.app"
          echo "Code signing verified."

      - name: Create .dmg
        run: |
          APP_NAME="PuriPhotoSearch"
          SIGN_IDENTITY="Developer ID Application: Phra Anavach Purivaro (7ZFZ2CSF6M)"
          DMG_NAME="${APP_NAME}-${{ github.ref_name }}-macOS.dmg"
          mkdir -p dist/dmg_staging
          cp -R dist/${APP_NAME}.app dist/dmg_staging/
          ln -s /Applications dist/dmg_staging/Applications
          hdiutil create \
            -volname "${APP_NAME}" \
            -srcfolder dist/dmg_staging \
            -ov -format UDBZ \
            "dist/${DMG_NAME}"
          rm -rf dist/dmg_staging

          # Sign the DMG
          codesign --force --sign "$SIGN_IDENTITY" "dist/${DMG_NAME}"

      - name: Notarize .dmg
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          APP_NAME="PuriPhotoSearch"
          DMG_NAME="${APP_NAME}-${{ github.ref_name }}-macOS.dmg"

          xcrun notarytool submit "dist/${DMG_NAME}" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "7ZFZ2CSF6M" \
            --wait

          xcrun stapler staple "dist/${DMG_NAME}"
          echo "Notarization complete and stapled."

      - name: Clean up keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/PuriPhotoSearch-*-macOS.dmg

  # ============================================================
  # Windows Build (.exe)
  # ============================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install matplotlib

      - name: Download InsightFace model
        run: python scripts/download_model.py models

      - name: Build .exe with PyInstaller
        run: |
          python -m PyInstaller photosearch_win.spec `
            --clean --noconfirm `
            --distpath dist --workpath build

      - name: Create zip archive
        run: |
          $version = "${{ github.ref_name }}"
          Compress-Archive -Path "dist\PuriPhotoSearch" -DestinationPath "dist\PuriPhotoSearch-${version}-Windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist/PuriPhotoSearch-*-Windows.zip

  # ============================================================
  # Create GitHub Release (only on tag push)
  # ============================================================
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PuriPhotoSearch ${{ github.ref_name }}"
          body: |
            ## PuriPhotoSearch ${{ github.ref_name }}

            ### Downloads
            - **macOS**: `PuriPhotoSearch-${{ github.ref_name }}-macOS.dmg`
            - **Windows**: `PuriPhotoSearch-${{ github.ref_name }}-Windows.zip`

            ### Installation
            **macOS**: Open .dmg → Drag to Applications
            **Windows**: Extract .zip → Run PuriPhotoSearch.exe
          files: |
            artifacts/macos-dmg/*
            artifacts/windows-zip/*
          draft: false
          prerelease: false
